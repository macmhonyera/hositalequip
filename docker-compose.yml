version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: hospitalequip_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-hospital_secure_pass}
      POSTGRES_DB: hospital_equip
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hospitalequip_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3001
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: postgres
      DB_PASSWORD: ${DB_PASSWORD:-hospital_secure_pass}
      DB_NAME: hospital_equip
      DB_SYNCHRONIZE: "true"
      JWT_SECRET: ${JWT_SECRET:-change_this_to_a_very_secure_secret_in_production}
      JWT_EXPIRES_IN: 24h
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change_this_refresh_secret_too}
      CORS_ORIGINS: ${FRONTEND_URL:-http://localhost:3000}
      DEFAULT_ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@hospital.com}
      DEFAULT_ADMIN_PASSWORD: ${ADMIN_PASSWORD:-Admin@123456}
    ports:
      - "3001:3001"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/api/v1/auth/profile || exit 0"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: hospitalequip_web
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: ${BACKEND_URL:-http://localhost:3001/api/v1}
    ports:
      - "3000:3000"

volumes:
  postgres_data:
    driver: local
